<!doctype html><html><head><meta charset="utf8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RMRF · Shield Lab</title>
<style>
  html,body{margin:0;height:100%;background:#0c1118;overflow:hidden;font-family:'Courier New',monospace;color:#cfe3ef}
  #c{position:fixed;inset:0}
  #panel{position:fixed;top:0;right:0;width:270px;max-height:100%;overflow-y:auto;
    background:rgba(8,14,22,0.86);border-left:1px solid rgba(255,255,255,0.15);padding:8px 10px;
    -webkit-overflow-scrolling:touch;font-size:11px;z-index:10}
  #panel h1{font-size:13px;letter-spacing:2px;margin:2px 0 8px;color:#46d6ff}
  .row{margin:5px 0}
  .row label{display:flex;justify-content:space-between;opacity:0.85}
  .row input[type=range]{width:100%;margin:2px 0}
  .btns{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
  .btns button, .seg button{background:#16303f;color:#cfe3ef;border:1px solid #2c5063;border-radius:5px;
    padding:6px 9px;font:inherit;cursor:pointer}
  .btns button:active{background:#1f4459}
  .seg{display:flex;gap:0;margin:4px 0}
  .seg button{border-radius:0}
  .seg button.on{background:#2b6c8c;border-color:#46d6ff}
  .seg button:first-child{border-radius:5px 0 0 5px}
  .seg button:last-child{border-radius:0 5px 5px 0}
  #hint{position:fixed;left:10px;bottom:10px;font-size:11px;opacity:0.6;z-index:10}
  input[type=color]{width:36px;height:24px;border:none;background:none;vertical-align:middle}
  textarea{width:100%;height:90px;background:#0a1017;color:#8fe;border:1px solid #2c5063;font:10px monospace}
</style>
<script type="importmap">{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }</script>
</head><body>
<canvas id="c"></canvas>
<div id="panel"><h1>SHIELD LAB</h1>
  <div class="row"><label>team colour <input type="color" id="col" value="#26aeff"></label></div>
  <div class="row">blending
    <div class="seg" id="blend"><button data-b="add" class="on">Additive</button><button data-b="normal">Normal</button></div>
  </div>
  <div class="row">hull inside
    <div class="seg" id="hull"><button data-h="1" class="on">on</button><button data-h="0">off</button></div>
  </div>
  <div id="sliders"></div>
  <div class="btns">
    <button id="hit">HIT (random)</button>
    <button id="autohit">auto-hit: off</button>
  </div>
  <div class="btns"><button id="reset">reset</button><button id="dump">copy values</button></div>
  <textarea id="out" readonly placeholder="copied settings appear here"></textarea>
</div>
<div id="hint">drag to orbit · tap the bubble to hit it there</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { makeShieldMaterial, pushShieldHit, stepShield } from './js/ShieldShader.js?v=2';

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene = new THREE.Scene(); scene.background = new THREE.Color(0x0c1118);
const cam = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
cam.position.set(0, 1.6, 5.2);
const controls = new OrbitControls(cam, renderer.domElement); controls.target.set(0,0.4,0);
scene.add(new THREE.HemisphereLight(0x88aaff, 0x223344, 0.8));
const dir = new THREE.DirectionalLight(0xffffff, 0.7); dir.position.set(3,6,4); scene.add(dir);

// a chunky "vehicle" hull inside the bubble for context
const hull = new THREE.Group();
const body = new THREE.Mesh(new THREE.BoxGeometry(1.5,0.6,2.2), new THREE.MeshStandardMaterial({color:0x4a5240,flatShading:true,roughness:0.9}));
body.position.y = 0.35; hull.add(body);
const turret = new THREE.Mesh(new THREE.BoxGeometry(0.7,0.5,0.9), new THREE.MeshStandardMaterial({color:0x3a4030,flatShading:true}));
turret.position.y = 0.85; hull.add(turret);
scene.add(hull);

// the shield bubble — UNIT sphere scaled to a squashed dome, like the game
const mat = makeShieldMaterial('#26aeff');
const bubble = new THREE.Mesh(new THREE.IcosahedronGeometry(1, 4), mat);
bubble.scale.set(1.9, 1.5, 2.4);
bubble.position.y = 0.5;
scene.add(bubble);

// ── sliders ──────────────────────────────────────────────────────────────────
const SPEC = [
  ['uLife',1,0,1,0.01],['uOpacity',0.76,0,2,0.01],['uFill',0.06,0,0.6,0.005],
  ['uHexScale',3,0.5,8,0.1],['uEdgeWidth',0.06,0,0.3,0.005],['uHexOpacity',0.13,0,0.6,0.01],
  ['uFresnelPower',1.8,0.2,5,0.05],['uFresnelStrength',1.75,0,4,0.05],
  ['uFlashSpeed',0.6,0,3,0.05],['uFlashIntensity',0.11,0,0.5,0.01],
  ['uFlowScale',2.4,0.5,8,0.1],['uFlowSpeed',1.13,0,3,0.05],['uFlowIntensity',1.0,0,6,0.05],
  ['uHitRingSpeed',1.75,0.2,4,0.05],['uHitRingWidth',0.12,0.02,0.4,0.005],['uHitMaxRadius',2.4,0.5,3.5,0.05],
  ['uHitDuration',1.6,0.3,4,0.05],['uHitIntensity',1.0,0,3,0.05],['uHitImpactRadius',0.5,0,1.5,0.02],
];
const box = document.getElementById('sliders'); const inputs = {};
for (const [k, def, min, max, step] of SPEC) {
  const row = document.createElement('div'); row.className = 'row';
  row.innerHTML = `<label>${k.replace(/^u/,'')} <span>${def}</span></label><input type=range min=${min} max=${max} step=${step} value=${def}>`;
  const inp = row.querySelector('input'), val = row.querySelector('span');
  inp.addEventListener('input', () => { mat.uniforms[k].value = +inp.value; val.textContent = inp.value; });
  box.appendChild(row); inputs[k] = { inp, val, def };
}

document.getElementById('col').addEventListener('input', e => mat.uniforms.uColor.value.set(e.target.value));
document.getElementById('blend').addEventListener('click', e => { const b = e.target.dataset.b; if(!b) return;
  mat.blending = b==='add' ? THREE.AdditiveBlending : THREE.NormalBlending; mat.needsUpdate = true;
  [...e.currentTarget.children].forEach(c=>c.classList.toggle('on', c.dataset.b===b)); });
document.getElementById('hull').addEventListener('click', e => { const h=e.target.dataset.h; if(h==null) return;
  hull.visible = h==='1'; [...e.currentTarget.children].forEach(c=>c.classList.toggle('on', c.dataset.h===h)); });

let now = 0;
function hitRandom(){ const d = new THREE.Vector3(Math.random()-.5,Math.random()-.5,Math.random()-.5).normalize(); pushShieldHit(mat, d, now); }
document.getElementById('hit').addEventListener('click', hitRandom);
let auto=false; document.getElementById('autohit').addEventListener('click', e => { auto=!auto; e.target.textContent = 'auto-hit: '+(auto?'on':'off'); });
document.getElementById('reset').addEventListener('click', () => { for(const [k,def] of SPEC.map(s=>[s[0],s[1]])){ mat.uniforms[k].value=def; inputs[k].inp.value=def; inputs[k].val.textContent=def; } });
document.getElementById('dump').addEventListener('click', () => {
  const o = { color: document.getElementById('col').value, blending: mat.blending===THREE.AdditiveBlending?'additive':'normal' };
  for (const [k] of SPEC) o[k] = mat.uniforms[k].value;
  const t = document.getElementById('out'); t.value = JSON.stringify(o, null, 0);
  t.select(); try{ document.execCommand('copy'); }catch(e){}
});

// tap the bubble to spawn a hit there
renderer.domElement.addEventListener('pointerdown', ev => {
  if (ev.target !== renderer.domElement) return;
  const r = renderer.domElement.getBoundingClientRect();
  const nd = new THREE.Vector2(((ev.clientX-r.left)/r.width)*2-1, -((ev.clientY-r.top)/r.height)*2+1);
  const ray = new THREE.Raycaster(); ray.setFromCamera(nd, cam);
  const hit = ray.intersectObject(bubble, false)[0];
  if (hit) { bubble.updateWorldMatrix(true,false); pushShieldHit(mat, bubble.worldToLocal(hit.point.clone()).normalize(), now); }
});

let last = performance.now();
function loop(t){ requestAnimationFrame(loop); const dt=(t-last)/1000; last=t; now += dt;
  stepShield(mat, now, mat.uniforms.uLife.value, null);
  if (auto && Math.random() < dt*2.5) hitRandom();
  controls.update(); renderer.render(scene, cam);
}
addEventListener('resize', () => { cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
renderer.setSize(innerWidth,innerHeight); requestAnimationFrame(loop);
window.__mat = mat;
</script>
</body></html>
