<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Lab · Decision Flow</title>
<!-- oops.js: surface module/load errors on-screen (mobile has no console). -->
<script src="../oops.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0d141c; color: #dfe8ef;
    font-family: 'Courier New', monospace; letter-spacing: 0.4px; }
  #app { display: flex; height: 100%; }
  #chart { flex: 1; overflow: auto; padding: 18px; }
  #chart svg { display: block; }
  #side { width: 320px; flex: none; border-left: 1px solid rgba(255,255,255,0.12);
    background: #0a1017; overflow-y: auto; padding: 14px; }
  header { padding: 12px 18px; border-bottom: 1px solid rgba(255,255,255,0.12);
    background: #0a1017; display: flex; align-items: baseline; gap: 12px; }
  header h1 { font-size: 15px; letter-spacing: 3px; }
  header .src { font-size: 10px; opacity: 0.55; }
  #wrap { display: flex; flex-direction: column; height: 100%; }
  .panel-title { font-size: 11px; letter-spacing: 2px; opacity: 0.6; margin: 14px 0 8px; }
  .panel-title:first-child { margin-top: 0; }
  .card { background: #111b26; border: 1px solid rgba(255,255,255,0.12);
    border-radius: 5px; padding: 9px 10px; margin-bottom: 8px; }
  .card .hd { font-size: 12px; font-weight: bold; letter-spacing: 1px; }
  .card .row { font-size: 10.5px; opacity: 0.8; margin-top: 4px; line-height: 1.5; }
  .card .to { color: #7dd3fc; }
  .tag { display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 8px;
    background: rgba(255,255,255,0.1); margin-left: 6px; vertical-align: middle; }
  details { margin-top: 4px; }
  details summary { cursor: pointer; font-size: 11px; letter-spacing: 2px; opacity: 0.6;
    list-style: none; padding: 4px 0; }
  details summary::-webkit-details-marker { display: none; }
  details summary::before { content: '[+] '; }
  details[open] summary::before { content: '[-] '; }
  .cfg { font-size: 10.5px; display: flex; justify-content: space-between;
    padding: 3px 0; border-bottom: 1px dashed rgba(255,255,255,0.08); cursor: pointer; }
  .cfg:hover { color: #fff; }
  .cfg .v { color: #9fe6b0; }
  .cfgdesc { display: none; font-size: 10px; line-height: 1.5; color: #aac4d6;
    padding: 4px 8px 8px; opacity: 0.9; }
  .cfgdesc.open { display: block; }
  svg polygon, svg rect[rx="6"] { cursor: help; }
  .legend { font-size: 10px; opacity: 0.6; margin-top: 6px; line-height: 1.6; }
  .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 2px;
    margin-right: 5px; vertical-align: middle; }
</style>
</head>
<body>
<div id="wrap">
  <header>
    <h1>AI&nbsp;LAB</h1>
    <span class="src">unit brain &mdash; live from rmrf/js/AI.js (DEFAULT_BRAIN)</span>
  </header>
  <div id="app">
    <div id="chart"></div>
    <div id="side"></div>
  </div>
</div>
<script type="module" src="./flow.js"></script>
</body>
</html>
