<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Lab · Decision Spine</title>
<script src="/oops.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0d141c; color: #dfe8ef;
    font-family: 'Courier New', monospace; letter-spacing: 0.3px; overflow: hidden; }
  #wrap { display: flex; flex-direction: column; height: 100%; }
  header { padding: 9px 16px; border-bottom: 1px solid rgba(255,255,255,0.12);
    background: #0a1017; display: flex; align-items: baseline; gap: 14px; flex: none; }
  header h1 { font-size: 13px; letter-spacing: 3px; }
  header .status { font-size: 10px; opacity: 0.6; }
  header .status.live { color: #6ee7a0; opacity: 1; }
  header .hint { font-size: 10px; opacity: 0.4; margin-left: auto; }
  #copybtn { font: bold 10px 'Courier New', monospace; letter-spacing: 1px; color: #7fd4ff;
    background: rgba(90,180,224,0.12); border: 1px solid rgba(90,180,224,0.45); border-radius: 5px;
    padding: 3px 12px; cursor: pointer; }
  #copybtn:hover { background: rgba(90,180,224,0.25); }
  #split { display: flex; flex: 1; min-height: 0; }
  .col { flex: 1; min-width: 0; display: flex; flex-direction: column;
    border-right: 1px solid rgba(255,255,255,0.12); position: relative; }
  .col:last-child { border-right: none; }
  .col-head { padding: 8px 14px; border-bottom: 1px solid rgba(255,255,255,0.08);
    background: #0f1822; flex: none; display: flex; align-items: baseline; gap: 10px; }
  .team-name { font-size: 12px; letter-spacing: 3px; opacity: 0.75; }
  .col-head .arch { font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
  .col-head .miss { font-size: 11px; opacity: 0.7; }

  /* top status panel: vehicle model + heading, glowing bars, brief-log stats */
  .top { flex: none; padding: 9px 12px; border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex; gap: 12px; align-items: center; background: #0e1620; }
  .veh { display: flex; flex-direction: column; align-items: center; gap: 2px; width: 60px; flex: none; }
  .silhouette { width: 52px; height: 52px; }
  .silhouette svg { width: 52px; height: 52px; overflow: visible; }
  .vlabel { font-size: 10px; font-weight: bold; letter-spacing: 1px; text-align: center; }
  .vlabel span { display: block; font-weight: normal; opacity: 0.6; font-size: 9px; text-transform: uppercase; }
  .bars { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .bar { display: flex; align-items: center; gap: 7px; font-size: 9px; }
  .bar .blab { width: 32px; opacity: 0.55; letter-spacing: 1px; flex: none; }
  .bar .btrack { flex: 1; height: 8px; border-radius: 4px; background: rgba(255,255,255,0.05);
    overflow: hidden; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05); }
  .bar .bfill { height: 100%; border-radius: 4px; opacity: 0.9; transition: width .3s; }
  .bar .bval { width: 30px; text-align: right; opacity: 0.7; flex: none; }
  .tstats { flex: none; font-size: 9px; opacity: 0.62; line-height: 1.55; text-align: right; max-width: 150px; }
  .tstats b { opacity: 0.9; font-weight: bold; }
  .tstats .stdet { font-size: 10px; font-weight: bold; opacity: 1; }
  .top .none { opacity: 0.4; font-size: 11px; }

  /* the spine: a centered vertical guide the active cards line up on */
  .spine { flex: 1; overflow-y: auto; padding: 6px 0 10px; position: relative; }
  .spine::before { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 0;
    border-left: 1px dashed rgba(255,255,255,0.12); }
  .layer { position: relative; padding: 4px 0 2px; }
  .lname { font-size: 9px; letter-spacing: 2px; opacity: 0.4; text-align: center; margin-bottom: 3px; }
  .track { overflow-x: auto; white-space: nowrap; scroll-behavior: smooth;
    padding: 4px calc(50% - 86px); scrollbar-width: none; cursor: grab; }
  .track::-webkit-scrollbar { display: none; }
  .track.grabbing { cursor: grabbing; scroll-behavior: auto; }
  .card { display: inline-block; white-space: normal; vertical-align: top; width: 168px;
    margin-right: 8px; border: 1px solid rgba(255,255,255,0.12); border-radius: 7px;
    background: #131e29; padding: 7px 9px; opacity: 0.42; transition: opacity .25s, transform .25s, box-shadow .25s;
    position: relative; }
  .card:last-child { margin-right: 0; }
  .card.on { opacity: 1; transform: scale(1.04); border-color: rgba(255,255,255,0.4);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 4px 18px rgba(0,0,0,0.4); }
  .card .cond { font-size: 10.5px; line-height: 1.32; white-space: pre-line; min-height: 14px; }
  .card .arrow { width: 0; height: 0; margin: 5px auto 3px; border-left: 5px solid transparent;
    border-right: 5px solid transparent; border-top: 6px solid rgba(255,255,255,0.3); }
  .card .badge { display: inline-block; padding: 1px 8px; border-radius: 4px; font-weight: bold;
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
  .card .rwhy { display: block; opacity: 0.62; font-size: 9px; margin-top: 4px; line-height: 1.3; }
  .card .metric { display: block; margin-top: 4px; font-size: 9px; color: #9fe6b0; opacity: 0.9; }
  .card .big { font-size: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
  .card.on .badge { box-shadow: 0 0 8px currentColor; }

  /* chain-of-command tail: the driver's standing order + the pedals this tick */
  .coc { max-width: 320px; margin: 2px auto 0; background: #0a1017; border: 1px solid rgba(255,255,255,0.12);
    border-radius: 7px; padding: 6px 10px; font-size: 10.5px; line-height: 1.5; }
  .coc .cl { display: flex; gap: 8px; }
  .coc .cl .ck { opacity: 0.45; width: 62px; flex: none; text-align: right; }
  .coc .mnv-v { color: #e0c05a; }
  .coc .drv-v { color: #6ee7a0; }
  .coc .alarm { color: #ff6a5a; font-weight: bold; }

  .log-wrap { flex: none; border-top: 1px solid rgba(255,255,255,0.1); background: #0b131b; }
  .sect-t { font-size: 9px; letter-spacing: 2px; opacity: 0.4; padding: 6px 14px 2px; }
  .log { max-height: 96px; overflow-y: auto; padding: 0 14px 8px; }
  .log .ln { padding: 2px 0; border-bottom: 1px dashed rgba(255,255,255,0.06); display: flex; gap: 8px; font-size: 10.5px; line-height: 1.35; }
  .log .ln .tm { opacity: 0.4; flex: none; width: 40px; text-align: right; }
  .log .ln.sw .mg { color: #fff; }
  .log .none { opacity: 0.4; font-size: 10.5px; padding: 3px 0; }
</style>
</head>
<body>
<div id="wrap">
  <header>
    <h1>AI&nbsp;LAB &middot; DECISION SPINE</h1>
    <span class="status" id="status">waiting for a live game&hellip;</span>
    <button id="copybtn" title="Copy the current decision state as text (paste it anywhere)">COPY</button>
    <span class="hint">drag a row sideways to see the options &middot; switch away from the game tab to pause</span>
  </header>
  <div id="split">
    <div class="col" id="col-0"></div>
    <div class="col" id="col-1"></div>
  </div>
</div>
<script src="./console.js"></script>
</body>
</html>
