<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Lab · Commander Flows</title>
<script src="../oops.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0d141c; color: #dfe8ef;
    font-family: 'Courier New', monospace; letter-spacing: 0.4px; }
  #wrap { display: flex; flex-direction: column; height: 100%; }
  header { padding: 12px 18px; border-bottom: 1px solid rgba(255,255,255,0.12);
    background: #0a1017; display: flex; align-items: baseline; gap: 14px; }
  header h1 { font-size: 15px; letter-spacing: 3px; }
  header .src { font-size: 10px; opacity: 0.55; }
  header a { color: #7dd3fc; font-size: 10px; text-decoration: none; opacity: 0.8; }
  #tabs { display: flex; gap: 2px; padding: 8px 14px 0; background: #0a1017;
    border-bottom: 1px solid rgba(255,255,255,0.12); }
  #tabs button { background: #111b26; color: #9fb4c6; border: 1px solid rgba(255,255,255,0.12);
    border-bottom: none; border-radius: 5px 5px 0 0; padding: 8px 16px; cursor: pointer;
    font-family: inherit; font-size: 12px; letter-spacing: 2px; }
  #tabs button.on { background: #17242f; color: #fff; border-color: #3d566e; }
  #app { display: flex; flex: 1; min-height: 0; }
  #chart { flex: 1; overflow: auto; padding: 18px; }
  #chart svg { display: block; }
  #side { width: 300px; flex: none; border-left: 1px solid rgba(255,255,255,0.12);
    background: #0a1017; overflow-y: auto; padding: 14px; }
  .panel-title { font-size: 11px; letter-spacing: 2px; opacity: 0.6; margin: 14px 0 8px; }
  .panel-title:first-child { margin-top: 0; }
  .card { background: #111b26; border: 1px solid rgba(255,255,255,0.12);
    border-radius: 5px; padding: 9px 10px; margin-bottom: 8px; }
  .card .row { font-size: 11px; opacity: 0.85; line-height: 1.55; }
  .card .to { color: #7dd3fc; }
  .cfg { font-size: 11px; display: flex; justify-content: space-between;
    padding: 3px 0; border-bottom: 1px dashed rgba(255,255,255,0.08); }
  .cfg .v { color: #9fe6b0; }
  .legend { font-size: 10px; opacity: 0.6; margin-top: 10px; line-height: 1.9; }
  .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 2px;
    margin-right: 4px; vertical-align: middle; }
</style>
</head>
<body>
<div id="wrap">
  <header>
    <h1>AI&nbsp;LAB &middot; COMMANDERS</h1>
    <span class="src">hand-authored from rmrf/js/AIStrategies.js &mdash; shared ladder + each persona&rsquo;s choose()</span>
    <a href="./index.html">&larr; unit brain</a>
  </header>
  <div id="tabs"></div>
  <div id="app">
    <div id="chart"></div>
    <div id="side"></div>
  </div>
</div>
<script type="module" src="./commanders.js"></script>
</body>
</html>
