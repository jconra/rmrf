<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RMRF</title>
    <!-- oops.js MUST be first so it catches module load errors (mobile has no console). -->
    <script src="/oops.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #0c1118; }
        canvas { display: block; }
        /* Instant dark loading splash — paints before any JS/Three.js loads so the
           page never flashes a blank light-blue panel. Removed on first render. */
        #boot-splash {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at 50% 42%, #16202b 0%, #0c1118 70%);
            font-family: 'Courier New', monospace;
            transition: opacity 0.45s ease;
        }
        #boot-splash.gone { opacity: 0; pointer-events: none; }
        #boot-splash .bs-word {
            font-size: 40px; font-weight: bold; letter-spacing: 14px;
            color: #cfe3ef; text-indent: 14px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
            animation: bs-pulse 1.4s ease-in-out infinite;
        }
        /* Fake shell line — commands type out for flavour (RMRF = rm -rf). */
        #boot-splash .bs-term {
            margin-top: 30px; width: 340px; max-width: 84vw; text-align: left;
            font-size: 13px; letter-spacing: 1px; white-space: nowrap;
            color: rgba(207,227,239,0.78);
        }
        #boot-splash .bs-prompt { color: #d9a441; margin-right: 8px; }
        #boot-splash .bs-cursor {
            display: inline-block; width: 8px; height: 15px;
            margin-left: 2px; vertical-align: -2px;
            background: #cfe3ef; animation: bs-blink 1s step-end infinite;
        }
        @keyframes bs-blink { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }
        @keyframes bs-pulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
        #hud {
            position: absolute; top: 14px; left: 14px; pointer-events: none;
            font-family: 'Courier New', monospace; color: #2b2118;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
            line-height: 1.7; letter-spacing: 1px;
        }
        #hud .title { font-size: 20px; font-weight: bold; letter-spacing: 5px; }
        #hud .sub { font-size: 11px; opacity: 0.7; }
        #perf {
            position: absolute; bottom: 10px; left: 12px; pointer-events: none;
            font-family: 'Courier New', monospace; font-size: 11px; line-height: 1.5;
            color: #1d2b33; text-shadow: 0 1px 2px rgba(255,255,255,0.6);
            text-align: left; letter-spacing: 1px;
        }
        /* On-screen NAV stick (right) — directional "go this way" pad (see main.js) */
        #touch-joystick {
            position: fixed; bottom: 34px; right: 26px; transform: none;
            width: 132px; height: 132px; border-radius: 50%;
            background: rgba(5, 12, 20, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 12px rgba(0,0,0,0.25), inset 0 0 18px rgba(255,255,255,0.06);
            z-index: 120; display: none; touch-action: none;
            user-select: none; -webkit-user-select: none;
        }
        #touch-joystick.visible { display: block; }
        /* On-screen AIM stick (left) — tilt to aim within the vehicle's firing arc
           (the lit wedge), push to the rim to FIRE. Aim-assist snaps to a nearby enemy. */
        #touch-aim {
            position: fixed; bottom: 34px; left: 26px;
            width: 132px; height: 132px; border-radius: 50%;
            background: rgba(20, 6, 6, 0.42);
            border: 1px solid rgba(255, 160, 160, 0.55);
            box-shadow: 0 0 12px rgba(0,0,0,0.25), inset 0 0 18px rgba(255,120,120,0.08);
            z-index: 120; display: none; touch-action: none;
            user-select: none; -webkit-user-select: none;
        }
        #touch-aim.visible { display: block; }
        #touch-aim.firing { border-color: rgba(255, 90, 90, 0.95); box-shadow: 0 0 18px rgba(255,60,60,0.5), inset 0 0 18px rgba(255,90,90,0.18); }
        /* Lit sector showing the firing arc (forward = up); set per-vehicle from JS. */
        #aim-arc {
            position: absolute; inset: 4px; border-radius: 50%;
            background: rgba(120,210,150,0.20); pointer-events: none;
        }
        #aim-knob {
            position: absolute; top: 50%; left: 50%;
            width: 56px; height: 56px; margin: -28px 0 0 -28px; border-radius: 50%;
            background: rgba(255, 160, 160, 0.18);
            border: 1px solid rgba(255, 170, 170, 0.8);
            box-shadow: 0 0 10px rgba(255,120,120,0.4);
            transition: transform 0.04s linear; pointer-events: none;
        }
        #aim-hint {
            position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
            font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.1em;
            color: rgba(255, 200, 200, 0.6); pointer-events: none;
        }
        .tj-label {
            position: absolute; font-size: 11px; font-weight: bold; letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.55); pointer-events: none;
        }
        .tj-w { top: 6px;  left: 50%; transform: translateX(-50%); }
        .tj-s { bottom: 6px; left: 50%; transform: translateX(-50%); }
        .tj-a { left: 8px;  top: 50%; transform: translateY(-50%); }
        .tj-d { right: 8px; top: 50%; transform: translateY(-50%); }
        #touch-knob {
            position: absolute; top: 50%; left: 50%;
            width: 56px; height: 56px; margin: -28px 0 0 -28px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.75);
            box-shadow: 0 0 10px rgba(255,255,255,0.35);
            transition: transform 0.05s linear;
        }
        /* On-screen FIRE buttons — one in each bottom corner (touch devices). One thumb
           steers on the field, the other fires from whichever corner is comfortable. */
        #fire-btn, #fire-btn-l {
            position: fixed; bottom: 50px;
            width: 92px; height: 92px; border-radius: 50%;
            background: rgba(40, 8, 8, 0.45);
            border: 1px solid rgba(255, 150, 150, 0.6);
            box-shadow: 0 0 12px rgba(0,0,0,0.25), inset 0 0 18px rgba(255,90,90,0.12);
            z-index: 120; display: none; touch-action: none;
            user-select: none; -webkit-user-select: none;
            font-family: 'Courier New', monospace; font-weight: bold; letter-spacing: 0.1em;
            color: rgba(255, 200, 200, 0.85); font-size: 14px;
            align-items: center; justify-content: center;
        }
        #fire-btn { right: 28px; }
        #fire-btn-l { left: 28px; }
        #fire-btn.visible, #fire-btn-l.visible { display: flex; }
        #fire-btn.pressed, #fire-btn-l.pressed { background: rgba(120, 20, 20, 0.6); transform: scale(0.94); }
        /* Player health + fuel readout (top-left, under the title) */
        #player-bars {
            position: absolute; top: 54px; left: 16px; z-index: 60; pointer-events: none;
            font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 2px;
            color: #2b2118; text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }
        #player-bars .row { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
        #player-bars .lbl { width: 30px; }
        #player-bars .track {
            display: block; width: 150px; height: 9px; background: rgba(0,0,0,0.35);
            border: 1px solid rgba(0,0,0,0.4); border-radius: 2px; overflow: hidden;
        }
        /* block, not the default inline — an inline span ignores width/height and
           collapses to zero, leaving only the empty grey track showing. */
        #player-bars .fill { display: block; height: 100%; width: 100%; transition: width 0.15s linear; }
        #hp-fill { background: #4fd14f; }
        #fuel-fill { background: #d9a441; }
        #ammo-fill { background: #cf6f3a; }
        #shield-fill { background: #46d6ff; }
        #player-bars .ammo-txt { width: 22px; text-align: right; opacity: 0.85; }
    </style>
</head>
<body>
    <!-- Instant loading splash (see #boot-splash CSS). main.js calls
         window.__rmrfHideSplash() after the first frame renders. -->
    <div id="boot-splash">
        <div class="bs-word">RMRF</div>
        <div class="bs-term"><span class="bs-prompt">$</span><span id="bs-cmd"></span><span class="bs-cursor"></span></div>
    </div>
    <script>
        window.__rmrfHideSplash = function () {
            var s = document.getElementById('boot-splash');
            if (!s) return;
            s.classList.add('gone');
            setTimeout(function () { s.remove(); }, 500);
        };
        // Type fake shell commands out, char by char, looping until the splash clears.
        (function () {
            var el = document.getElementById('bs-cmd');
            if (!el) return;
            var cmds = [
                'rm -rf /enemy_base',
                'sudo ./deploy_tank.sh --team a',
                './capture_the_flag.sh',
                'git push --force the-front-line',
                'mount /dev/island --rw',
                'chmod 777 /victory'
            ];
            var ci = 0, n = 0, mode = 'type';
            function tick() {
                if (!document.getElementById('boot-splash')) return;  // splash gone → stop
                var cmd = cmds[ci];
                if (mode === 'type') {
                    n++; el.textContent = cmd.slice(0, n);
                    if (n >= cmd.length) { mode = 'erase'; return setTimeout(tick, 1100); }
                    setTimeout(tick, 50 + Math.random() * 65);
                } else {
                    n -= 2; if (n < 0) n = 0;
                    el.textContent = cmd.slice(0, n);
                    if (n <= 0) { ci = (ci + 1) % cmds.length; mode = 'type'; return setTimeout(tick, 320); }
                    setTimeout(tick, 22);
                }
            }
            tick();
        })();
    </script>
    <!-- In-game top-left title removed — the title lives on the menu screen now. -->
    <div id="hud"></div>
    <div id="player-bars" style="display:none">
        <div class="row"><span class="lbl">HULL</span><span class="track"><span id="hp-fill" class="fill"></span></span></div>
        <div class="row"><span class="lbl">FUEL</span><span class="track"><span id="fuel-fill" class="fill"></span></span></div>
        <div class="row"><span class="lbl">AMMO</span><span class="track"><span id="ammo-fill" class="fill"></span></span><span id="ammo-txt" class="ammo-txt"></span></div>
        <div class="row" id="shield-row" style="display:none"><span class="lbl">SHLD</span><span class="track"><span id="shield-fill" class="fill"></span></span></div>
    </div>
    <div id="perf"></div>
    <div id="touch-joystick" aria-hidden="true">
        <span class="tj-label tj-s">MOVE</span>
        <div id="touch-knob"></div>
    </div>
    <div id="fire-btn-l" aria-hidden="true">FIRE</div>
    <div id="fire-btn" aria-hidden="true">FIRE</div>
    <div id="touch-aim" aria-hidden="true">
        <div id="aim-arc"></div>
        <div id="aim-knob"></div>
        <span id="aim-hint">AIM</span>
    </div>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="js/main.js?v=252"></script>
</body>
</html>
